<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Random Story Generator</title>
</head>
<body>
  <div class="container">
    <h2>Random Story Generator</h2>
    <!-- This is where the story will appear -->
    <div id="story">Click the button to see a story!</div>
    
    <!-- Button to trigger the JavaScript function -->
    <button onclick="generateStory()">Generate Story</button>
  </div>

  <script>
    const stories = [
      "🌧️ Walking alone, then 🌈 finding hope",
      "📚 Studying hard → 🎓 achieving dreams",
      "🌙 Thinking deeply → ✨ discovering ideas",
      "🚶 Small steps → 🏆 big success"
    ];

    function generateStory() {
      const storyElement = document.getElementById("story");
      storyElement.innerHTML =
        stories[Math.floor(Math.random() * stories.length)];
    }
  </script>
</body>
</html>
